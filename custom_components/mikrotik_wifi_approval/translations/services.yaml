approve:
  name: Approve device
  description: Add a MAC address to the WiFi access list with action "accept".
  fields:
    mac:
      name: MAC address
      description: MAC address of the device to approve.
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:
    comment:
      name: Comment
      description: Optional comment/label to store on the access-list entry.
      required: false
      example: "Telefon Ana"
      selector:
        text:

reject:
  name: Reject device
  description: Add a MAC address to the WiFi access list with action "reject".
  fields:
    mac:
      name: MAC address
      description: MAC address of the device to reject.
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:
    comment:
      name: Comment
      description: Optional comment/label to store on the access-list entry.
      required: false
      example: "Necunoscut"
      selector:
        text:

disconnect:
  name: Disconnect device
  description: Force-disconnect an already-connected WiFi client.
  fields:
    mac:
      name: MAC address
      description: MAC address of the device to disconnect.
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:

make_static:
  name: Make DHCP lease static
  description: Convert a device's current DHCP lease into a static one.
  fields:
    mac:
      name: MAC address
      description: MAC address of the device whose lease should become static.
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:
