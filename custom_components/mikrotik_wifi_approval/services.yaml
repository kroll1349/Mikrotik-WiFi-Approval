approve:
  name: Approve device
  description: Add a MAC address to the WiFi access list with action "accept".
  fields:
    mac:
      name: MAC address
      description: MAC address of the device to approve.
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:
    comment:
      name: Comment
      description: Optional comment/label to store on the access-list entry.
      required: false
      example: "Telefon Ana"
      selector:
        text:

reject:
  name: Reject device
  description: Add a MAC address to the WiFi access list with action "reject".
  fields:
    mac:
      name: MAC address
      description: MAC address of the device to reject.
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:
    comment:
      name: Comment
      description: Optional comment/label to store on the access-list entry.
      required: false
      example: "Necunoscut"
      selector:
        text:

disconnect:
  name: Disconnect device
  description: Force-disconnect an already-connected WiFi client.
  fields:
    mac:
      name: MAC address
      description: MAC address of the device to disconnect.
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:

make_static:
  name: Make DHCP lease static
  description: Convert a device's current DHCP lease into a static one.
  fields:
    mac:
      name: MAC address
      description: MAC address of the device whose lease should become static.
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:

approve_all_current:
  name: Approve all currently connected devices
  description: >-
    Adds an explicit "accept" access-list entry for every device that is
    currently connected and not already decided. Run this BEFORE enabling
    strict mode, so none of your existing devices get locked out.

enable_strict_mode:
  name: Enable strict mode (block unapproved devices)
  description: >-
    Runs approve_all_current, then adds a catch-all "reject" rule at the
    end of the access-list. After this, any device without an explicit
    accept entry will be refused at connection time and must be approved
    from Home Assistant before it can join the WiFi.
